<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/"/>
  <meta charset="utf-8" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Explore and shop our curated creations inspired by the giving tree, our national treature, the palm, and meticulously designed by our craftswomen." />
  <link rel="apple-touch-icon" href="logo192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/font-awesome.min.css">
  <link rel="stylesheet" href="css/aos.css">
  <link rel="stylesheet" href="css/slick.css">
  <link rel="stylesheet" href="css/stylesheet.css">
  <title>AlGhadeer Emirati Crafts</title>

  <style>
    @font-face {
      font-family: 'Lyon Arabic Display';
      src: url('/fonts/LyonArabicDisplay-Black.eot');
      src: url('/fonts/LyonArabicDisplay-Black.eot?#iefix') format('embedded-opentype'),
        url('/fonts/LyonArabicDisplay-Black.woff2') format('woff2'),
        url('/fonts/LyonArabicDisplay-Black.woff') format('woff'),
        url('/fonts/LyonArabicDisplay-Black.ttf') format('truetype');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Lyon Arabic Text No 2';
      src: url('/fonts/LyonArabicText-RegularNo2.eot');
      src: url('/fonts/LyonArabicText-RegularNo2.eot?#iefix') format('embedded-opentype'),
        url('/fonts/LyonArabicText-RegularNo2.woff2') format('woff2'),
        url('/fonts/LyonArabicText-RegularNo2.woff') format('woff'),
        url('/fonts/LyonArabicText-RegularNo2.ttf') format('truetype');
      font-weight: 500;
      font-style: normal;
      font-display: swap;
    }
  </style>

  <!-- Mastercard Checkout script -->
  <script>
    // Define the flag in the global scope
    window.isMastercardScriptLoaded = false;

    function mastercardScriptLoaded() {
      // console.log("Mastercard Checkout script loaded successfully.");
      window.isMastercardScriptLoaded = true;
    }
  </script>
  <script src="https://eu-gateway.mastercard.com/static/checkout/checkout.min.js"
    onload="mastercardScriptLoaded()">
  </script>
<!-- <script crossorigin
src="https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js">
</script> -->
  <!-- Other external scripts -->
  <script crossorigin
  src="https://applepay.cdn-apple.com/jsapi/1.latest/apple-pay-sdk.js"
  ></script>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- <script src="https://applepay.cdn-apple.com/jsapi/v1.1.0/apple-pay-sdk.js" crossorigin async data-initial-token="Your Apple Pay JS token"></script> -->
  <script src="https://img.mpay.samsung.com/gsmpi/sdk/samsungpay_web_sdk.js"></script>

  
  <style>
    apple-pay-button {
      --apple-pay-button-width: 150px;
      --apple-pay-button-height: 30px;
      --apple-pay-button-border-radius: 3px;
      --apple-pay-button-padding: 0px 0px;
      --apple-pay-button-box-sizing: border-box;
    }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

  <script>
    $(document).ready(function () {
      // if (document.URL === "https://www.alghadeeruaecrafts.ae") {
      if (document.URL === "https://www.alghadeeruaecrafts.ae") {

        $('body').addClass("home-pg");
        $('body').removeClass("sub-page");
      } else {
        $('body').removeClass("home-pg");
        $('body').addClass("sub-page");
      }

      // Check if Mastercard script loaded
      setTimeout(() => {
        if (!window.isMastercardScriptLoaded) {
          console.error("Mastercard Checkout script failed to load.");
        }
      }, 5000); // Check after 5 seconds
    });
  </script>
</body>
</html>
